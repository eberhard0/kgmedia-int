# /etc/nginx/sites-available/kgmedia
# Reverse proxy for the Next.js app on localhost:3000.
# certbot will inject the SSL listener block on first run.

server {
    listen 80;
    server_name predict-test.kompaskita.com;

    # Larger SSE buffer + long timeouts for the scan endpoint
    proxy_buffering off;
    proxy_read_timeout 360s;
    proxy_send_timeout 360s;

    # gzip the regular API + page responses
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Block direct access to the scan endpoints from the public internet —
    # only the systemd timer (running on the loopback) needs to hit them,
    # and the app already enforces CRON_SECRET, but defense in depth.
    location ~ ^/api/(amplification/)?scan$ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
